<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Algoritmos de IA — Aprenda do Zero</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0b13;
    --surface: rgba(18, 18, 26, 0.85);
    --card: #151522;
    --card-hover: #1c1c2a;
    --border: #29293e;
    --accent1: #8b5cf6;
    --accent2: #0ea5e9;
    --accent3: #f59e0b;
    --accent4: #10b981;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --muted: #64748b;
    --highlight: #c4b5fd;
    --max-w: 1200px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(139,92,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,92,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }

  /* HEADER */
  header {
    width: 100%;
    padding: 3rem 1.5rem 2rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(139,92,246,0.06) 0%, transparent 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header .tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent2);
    border: 1px solid rgba(14,165,233,0.3);
    background: rgba(14,165,233,0.1);
    padding: 0.35rem 1rem;
    border-radius: 50px;
    margin-bottom: 1.25rem;
  }

  header h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, #c4b5fd 0%, #38bdf8 50%, #fbbf24 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.15;
    max-width: 800px;
  }

  header p {
    color: var(--text-dim);
    margin-top: 1rem;
    font-size: 1.05rem;
    max-width: 600px;
    line-height: 1.5;
  }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    width: 100%;
    padding: 1.25rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    justify-content: center;
  }
  .progress-bar-inner {
    width: 100%;
    max-width: var(--max-w);
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    border-radius: 6px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 10px rgba(139,92,246,0.3);
  }

  .progress-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--highlight);
  }

  /* CATEGORY TABS */
  .category-nav-wrap {
    width: 100%;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: center;
  }
  .category-nav {
    width: 100%;
    max-width: var(--max-w);
    display: flex;
    gap: 0.75rem;
    padding: 1.25rem 1.5rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .category-nav::-webkit-scrollbar { display: none; }

  .cat-btn {
    flex-shrink: 0;
    padding: 0.5rem 1.25rem;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    color: var(--text-dim);
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s ease;
  }

  .cat-btn:hover { color: var(--text); border-color: var(--accent1); }
  .cat-btn.active {
    background: var(--accent1);
    border-color: var(--accent1);
    color: white;
    box-shadow: 0 4px 12px rgba(139,92,246,0.25);
  }

  /* FILTER BAR */
  .filter-bar-wrap {
    width: 100%;
    padding: 1rem 1.5rem;
    display: flex;
    justify-content: center;
  }
  .filter-bar {
    width: 100%;
    max-width: var(--max-w);
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: space-between;
  }

  .search-input {
    flex: 1;
    min-width: 200px;
    max-width: 400px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 1rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    border-radius: 6px;
    outline: none;
    transition: all 0.2s;
  }
  .search-input:focus { border-color: var(--accent2); box-shadow: 0 0 0 2px rgba(14,165,233,0.15); }
  .search-input::placeholder { color: var(--muted); }

  /* ALGORITHM GRID */
  .algo-grid-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 0 1.5rem 3rem 1.5rem;
  }
  .algo-grid {
    width: 100%;
    max-width: var(--max-w);
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.25rem;
  }

  .algo-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .algo-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--cat-color, var(--accent1));
    opacity: 0.8;
  }

  .algo-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255,255,255,0.15);
    background: var(--card-hover);
    box-shadow: 0 12px 24px -10px rgba(0,0,0,0.5);
  }

  .algo-card.learned {
    background: rgba(16,185,129,0.03);
    border-color: rgba(16,185,129,0.2);
  }
  .algo-card.learned::before { background: var(--accent4); opacity: 1; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
  }

  .card-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 700;
  }

  .card-status {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    transition: all 0.3s;
    background: var(--bg);
  }
  .algo-card.learned .card-status {
    background: var(--accent4);
    border-color: var(--accent4);
    color: white;
  }

  .card-emoji { font-size: 2.2rem; margin-bottom: 0.75rem; line-height: 1; }

  .card-name {
    font-size: 1.1rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 0.4rem;
    color: var(--text);
  }

  .card-desc {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.5;
    flex-grow: 1;
  }

  .card-cat-badge {
    display: inline-table;
    align-self: flex-start;
    margin-top: 1.25rem;
    font-size: 0.65rem;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    border-radius: 4px;
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,5,10,0.85);
    z-index: 200;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 720px;
    width: 100%;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    animation: scaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
  }

  @keyframes scaleUp {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 1.75rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    background: linear-gradient(135deg, rgba(139,92,246,0.08) 0%, rgba(0,0,0,0) 100%);
    border-radius: 12px 12px 0 0;
  }

  .modal-header-left { flex: 1; }

  .modal-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent2);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .modal-title {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.2;
    color: var(--text);
  }

  .modal-subtitle {
    font-size: 0.95rem;
    color: var(--text-dim);
    margin-top: 0.4rem;
  }

  .modal-close {
    background: rgba(255,255,255,0.05);
    border: none;
    color: var(--text-dim);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    margin-left: 1rem;
  }
  .modal-close:hover { color: white; background: rgba(255,255,255,0.15); }

  .modal-body { 
    padding: 1.5rem 2rem; 
    overflow-y: auto; 
    flex: 1;
  }
  .modal-body::-webkit-scrollbar { width: 8px; }
  .modal-body::-webkit-scrollbar-track { background: transparent; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* TABS inside modal */
  .tab-nav {
    display: flex;
    gap: 0.5rem;
    border-bottom: 2px solid var(--border);
    margin-bottom: 1.75rem;
  }
  .tab-btn {
    padding: 0.75rem 1rem;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    transition: all 0.2s;
    letter-spacing: 0.03em;
    position: relative;
  }
  .tab-btn::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0; right: 0;
    height: 2px;
    background: var(--accent1);
    transform: scaleX(0);
    transition: transform 0.2s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent1); }
  .tab-btn.active::after { transform: scaleX(1); }

  .tab-content { display: none; animation: fadeIn 0.3s; }
  .tab-content.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* CONTENT SECTIONS */
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 0.75rem;
  }

  .explain-text {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .analogy-box {
    background: rgba(245,158,11,0.05);
    border: 1px solid rgba(245,158,11,0.15);
    border-left: 4px solid var(--accent3);
    padding: 1.25rem;
    border-radius: 6px;
    margin-bottom: 1.5rem;
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }

  .analogy-box .emoji { font-size: 1.75rem; line-height: 1; }
  .analogy-box p { font-size: 0.9rem; line-height: 1.6; color: var(--text); margin:0; }

  .use-cases {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .use-case-tag {
    font-size: 0.75rem;
    padding: 0.35rem 0.75rem;
    background: rgba(14,165,233,0.1);
    border: 1px solid rgba(14,165,233,0.2);
    color: var(--accent2);
    border-radius: 50px;
    font-weight: 600;
  }

  .pros-cons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .pros, .cons {
    padding: 1.25rem;
    border-radius: 8px;
    font-size: 0.85rem;
  }

  .pros {
    background: rgba(16,185,129,0.05);
    border: 1px solid rgba(16,185,129,0.15);
  }

  .cons {
    background: rgba(239,68,68,0.05);
    border: 1px solid rgba(239,68,68,0.15);
  }

  .pros-cons h4 {
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .pros h4 { color: var(--accent4); }
  .cons h4 { color: #f87171; }

  .pros ul, .cons ul { padding-left: 1.25rem; line-height: 1.7; color: var(--text-dim); }

  /* CODE BLOCK */
  .code-block {
    background: #09090c;
    border: 1px solid #1f1f2e;
    border-radius: 8px;
    padding: 1.25rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    line-height: 1.6;
    overflow-x: auto;
    color: #c4b5fd;
    margin-bottom: 1.25rem;
  }

  .code-block::-webkit-scrollbar { height: 8px; }
  .code-block::-webkit-scrollbar-thumb { background: #1f1f2e; border-radius: 4px; }

  .code-block .kw { color: #38bdf8; }
  .code-block .fn { color: #fbbf24; }
  .code-block .cm { color: #64748b; font-style: italic; }
  .code-block .st { color: #34d399; }

  /* QUIZ */
  .quiz-question {
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 1.25rem;
    line-height: 1.5;
  }

  .quiz-options { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.25rem; }

  .quiz-option {
    padding: 1rem 1.25rem;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    color: var(--text);
    cursor: pointer;
    text-align: left;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 8px;
  }
  .quiz-option:hover:not(:disabled) { 
    border-color: var(--accent1); 
    background: rgba(139,92,246,0.05); 
    transform: translateX(4px);
  }
  .quiz-option:disabled { cursor: default; }
  .quiz-option.correct { 
    border-color: var(--accent4); 
    background: rgba(16,185,129,0.1); 
    color: var(--text);
    box-shadow: 0 0 0 1px var(--accent4);
  }
  .quiz-option.wrong { 
    border-color: #f87171; 
    background: rgba(239,68,68,0.1); 
    color: var(--text); 
  }

  .quiz-feedback {
    padding: 1rem 1.25rem;
    border-radius: 8px;
    font-size: 0.9rem;
    line-height: 1.6;
    display: none;
    animation: fadeIn 0.3s;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); color: #34d399; }
  .quiz-feedback.fail { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }

  /* MODAL FOOTER */
  .modal-footer {
    padding: 1.25rem 2rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    background: var(--bg);
    border-radius: 0 0 12px 12px;
  }

  .btn {
    padding: 0.65rem 1.25rem;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    transition: all 0.2s;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .btn-primary { background: var(--accent1); color: white; }
  .btn-primary:hover { background: #7c3aed; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(139,92,246,0.3); }
  .btn-success { background: var(--accent4); color: white; }
  .btn-success:hover { background: #059669; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); background: rgba(255,255,255,0.05); }

  .nav-btns { display: flex; gap: 0.5rem; }

  .empty-state {
    padding: 4rem 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 1rem;
    grid-column: 1 / -1;
    background: var(--card);
    border-radius: 12px;
    border: 1px dashed var(--border);
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .pros-cons { grid-template-columns: 1fr; gap: 0.75rem; }
    .algo-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    .modal-footer { flex-direction: column; align-items: stretch; }
    .nav-btns { display: grid; grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 500px) {
    header { padding: 2rem 1rem 1.5rem; }
    header h1 { font-size: 1.7rem; }
    .modal-body, .modal-header, .modal-footer { padding: 1.25rem 1rem; }
    .modal-title { font-size: 1.3rem; }
    .card-name { font-size: 1rem; }
    .analogy-box { flex-direction: column; gap: 0.5rem; padding: 1rem; }
    .tab-btn { padding: 0.75rem 0.5rem; font-size: 0.8rem; }
    .filter-bar { justify-content: center; }
    .search-input { min-width: 100%; }
  }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="tag">curso interativo</div>
  <h1>30 Algoritmos de IA</h1>
  <p>Aprenda do zero com explicações, analogias e quizzes</p>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar-inner">
    <span class="progress-label">PROGRESSO</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-count" id="progressCount">0 / 30</span>
  </div>
</div>

<div class="category-nav-wrap">
  <div class="category-nav" id="catNav"></div>
</div>

<div class="filter-bar-wrap">
  <div class="filter-bar">
    <input class="search-input" type="text" placeholder="Buscar algoritmo..." id="searchInput">
    <button class="btn btn-ghost" id="resetBtn" onclick="resetProgress()">↺ Resetar progresso</button>
  </div>
</div>

<div class="algo-grid-wrap">
  <div class="algo-grid" id="algoGrid"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-num" id="mNum"></div>
        <div class="modal-title" id="mTitle"></div>
        <div class="modal-subtitle" id="mSub"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('explain',this)">📖 Explicação</button>
        <button class="tab-btn" onclick="switchTab('code',this)">💻 Código</button>
        <button class="tab-btn" onclick="switchTab('quiz',this)">🧠 Quiz</button>
      </div>

      <!-- EXPLAIN TAB -->
      <div class="tab-content active" id="tab-explain">
        <div class="section-label">O que é?</div>
        <div class="explain-text" id="mExplain"></div>

        <div class="section-label">Analogia do dia a dia</div>
        <div class="analogy-box">
          <div class="emoji" id="mAnalogyEmoji"></div>

// STATE
let learned = new Set(JSON.parse(localStorage.getItem('ai_learned') || '[]'));
let currentIdx = 0;
let currentCat = 'all';

function saveProgress() {
  localStorage.setItem('ai_learned', JSON.stringify([...learned]));
  updateProgress();
}

function updateProgress() {
  const n = learned.size;
  document.getElementById('progressFill').style.width = (n/30*100) + '%';
  document.getElementById('progressCount').textContent = `${n} / 30`;
}

function resetProgress() {
  if (confirm('Resetar todo o progresso?')) {
    learned = new Set();
    saveProgress();
    renderGrid(currentCat);
  }
}

// RENDER CATEGORIES
function renderCats() {
  const nav = document.getElementById('catNav');
  nav.innerHTML = `<button class="cat-btn active" onclick="filterCat('all', this)">Todos (30)</button>`;
  const counts = {};
  ALGOS.forEach(a => { counts[a.cat] = (counts[a.cat]||0) + 1; });
  Object.entries(CATEGORIES).forEach(([key, val]) => {
    nav.innerHTML += `<button class="cat-btn" onclick="filterCat('${key}', this)">${val.label} (${counts[key]||0})</button>`;
  });
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(cat);
}

// RENDER GRID
function renderGrid(cat) {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('algoGrid');
  let algos = ALGOS;
  if (cat !== 'all') algos = algos.filter(a => a.cat === cat);
  if (search) algos = algos.filter(a => a.name.toLowerCase().includes(search) || a.short.toLowerCase().includes(search));

  if (algos.length === 0) {
    grid.innerHTML = '<div class="empty-state">Nenhum algoritmo encontrado.</div>';
    return;
  }

  grid.innerHTML = algos.map(a => {
    const catColor = CATEGORIES[a.cat]?.color || '#7c3aed';
    const isLearned = learned.has(a.id);
    return `
    <div class="algo-card ${isLearned ? 'learned' : ''}" 
         style="--cat-color:${catColor}" 
         onclick="openAlgo(${a.id})">
      <div class="card-top">
        <span class="card-num">#${String(a.id).padStart(2,'0')}</span>
        <div class="card-status">${isLearned ? '✓' : ''}</div>
      </div>
      <div class="card-emoji">${a.emoji}</div>
      <div class="card-name">${a.name}</div>
      <div class="card-desc">${a.short}</div>
      <span class="card-cat-badge" style="color:${catColor}">${CATEGORIES[a.cat]?.label || ''}</span>
    </div>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input', () => renderGrid(currentCat));

// MODAL
function openAlgo(id) {
  currentIdx = ALGOS.findIndex(a => a.id === id);
  renderModal();
  document.getElementById('modalOverlay').classList.add('open');
  // Reset to explain tab
  switchTabByName('explain');
}

function renderModal() {
  const a = ALGOS[currentIdx];
  document.getElementById('mNum').textContent = `Algoritmo #${String(a.id).padStart(2,'0')} · ${CATEGORIES[a.cat]?.label}`;
  document.getElementById('mTitle').textContent = `${a.emoji} ${a.name}`;
  document.getElementById('mSub').textContent = a.short;
  document.getElementById('mExplain').textContent = a.explain;
  document.getElementById('mAnalogyEmoji').textContent = a.analogyEmoji;
  document.getElementById('mAnalogy').textContent = a.analogy;
  document.getElementById('mUseCases').innerHTML = a.useCases.map(u => `<span class="use-case-tag">${u}</span>`).join('');
  document.getElementById('mPros').innerHTML = a.pros.map(p => `<li>${p}</li>`).join('');
  document.getElementById('mCons').innerHTML = a.cons.map(c => `<li>${c}</li>`).join('');
  document.getElementById('mCode').innerHTML = a.code;
  document.getElementById('mCodeExplain').textContent = a.codeExplain;

  // Quiz
  document.getElementById('qQuestion').textContent = a.quiz.q;
  document.getElementById('qOptions').innerHTML = a.quiz.opts.map((o,i) =>
    `<button class="quiz-option" onclick="answerQuiz(${i})">${o}</button>`
  ).join('');
  document.getElementById('qFeedback').className = 'quiz-feedback';
  document.getElementById('qFeedback').textContent = '';

  // Mark button
  const btn = document.getElementById('markBtn');
  if (learned.has(a.id)) {
    btn.textContent = '✓ Aprendido!';
    btn.className = 'btn btn-ghost';
  } else {
    btn.textContent = '✓ Marcar como aprendido';
    btn.className = 'btn btn-success';
  }
}

function answerQuiz(idx) {
  const a = ALGOS[currentIdx];
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach(b => b.disabled = true);
  opts[idx].classList.add(idx === a.quiz.correct ? 'correct' : 'wrong');
  if (idx !== a.quiz.correct) opts[a.quiz.correct].classList.add('correct');
  const fb = document.getElementById('qFeedback');
  fb.textContent = (idx === a.quiz.correct ? '🎉 ' : '❌ ') + a.quiz.feedback;
  fb.className = `quiz-feedback show ${idx === a.quiz.correct ? 'ok' : 'fail'}`;
  if (idx === a.quiz.correct) {
    learned.add(a.id);
    saveProgress();
    renderGrid(currentCat);
    document.getElementById('markBtn').textContent = '✓ Aprendido!';
    document.getElementById('markBtn').className = 'btn btn-ghost';
  }
}

function toggleLearned() {
  const a = ALGOS[currentIdx];
  if (learned.has(a.id)) {
    learned.delete(a.id);
  } else {
    learned.add(a.id);
  }
  saveProgress();
  renderGrid(currentCat);
  renderModal();
}

function navAlgo(dir) {
  currentIdx = (currentIdx + dir + ALGOS.length) % ALGOS.length;
  renderModal();
  switchTabByName('explain');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function switchTabByName(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', i === ['explain','code','quiz'].indexOf(name));
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('modalOverlay').classList.contains('open')) return;
  if (e.key === 'ArrowRight') navAlgo(1);
  if (e.key === 'ArrowLeft') navAlgo(-1);
  if (e.key === 'Escape') closeModalDirect();
});

// INIT
renderCats();
renderGrid('all');
updateProgress();
</script>
</body>
</html>
